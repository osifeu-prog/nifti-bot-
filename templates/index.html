<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>NIFTI Dashboard</title></head>
<body>
<h1>ברוך הבא ל-NIFTI</h1>
<p>טען את הנתונים שלך...</p>
<script>
fetch('/api/user/' + new URLSearchParams(window.location.search).get('user_id'))
  .then(r => r.json())
  .then(u => {
    document.body.innerHTML = `<h1>👤 ${u.card_name || 'אורח'}</h1><p>💰 מחיר: ${u.price || 0} TON</p>`;
  });
</script>
</body>
</html>
