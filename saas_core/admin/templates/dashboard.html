<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-8">
    <h1 class="text-2xl font-bold mb-6">NIFTI Admin Dashboard</h1>
    <table class="w-full bg-white rounded shadow">
        <thead>
            <tr class="bg-gray-200">
                <th class="p-4 border">User ID</th>
                <th class="p-4 border">Amount</th>
                <th class="p-4 border">Hash</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td class="p-4 border">{{ user.user_id }}</td>
                <td class="p-4 border">{{ user.amount }}</td>
                <td class="p-4 border">{{ user.tx_hash[:10] }}...</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
